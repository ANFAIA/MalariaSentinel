# agents/memory/scripts/bootstrap/01-opencode-native-protection.yaml
# Architecture decision: opencode-native file protection (recorded 2026-07-07).

project: MalariaSentinel
group_id: malariasentinel
schema_source: agents/memory/runtime/config/config.yaml

architectures:
  - uuid: arch-opencode-native-protection
    name: opencode-native file protection
    summary: |
      Project-level governance files (AGENTS.md, .gitignore,
      opencode.json, agents/memory/.project) are protected by OpenCode's
      permission.edit: "ask" block in opencode.json. Every attempt to
      edit one of them prompts the user, no exceptions, no allowances.
      No parallel file-protection subsystem; everything lives in
      `opencode.json` under `permission.edit` and `permission.bash`. The small bash deny list
      (make -f agents/memory/scripts/Makefile {wipe,set-project}) is
      kept as defence against typos, not as file protection.

preferences:
  - uuid: pref-protected-paths-in-opencode-json
    name: PREF-protected-paths-live-in-opencode-json
    summary: |
      The list of protected paths lives inline under
      opencode.json:permission.edit. Adding a new protected file means
      editing opencode.json — not a separate .protected file. The
      trade-off: discoverability lives in opencode.json, the protected
      list travels with the config in git history, and there is no
      second source of truth to keep in sync.

pitfalls:
  - uuid: pitfall-do-not-rewrite-opencode-protection
    name: PITFALL-do-not-rewrite-opencode-protection
    summary: |
      Do not reintroduce a parallel file-protection subsystem. Extend
      `permission.edit` or `permission.bash` in `opencode.json`. The whole point of the 2026-07 simplification
      was to collapse three enforcement layers (agent-level, git hook,
      opencode deny) into one (opencode ask). If a new requirement
      appears, extend permission.edit or permission.bash in
      opencode.json — do not create a parallel subsystem.

relations:
  - { src: arch-opencode-native-protection,        type: GOVERNS,       dst: opencode-config }
  - { src: pref-protected-paths-in-opencode-json,  type: ENFORCES,       dst: arch-opencode-native-protection }
  - { src: pitfall-do-not-rewrite-opencode-protection, type: MOTIVATED_BY, dst: arch-opencode-native-protection }
