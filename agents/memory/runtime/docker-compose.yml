services:
  neo4j:
    image: neo4j:5.26.0
    container_name: malariasentinel-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser (UI editable)
      - "7687:7687"   # Bolt protocol (Graphiti driver)
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-malariasentinel_dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:standalone
    container_name: malariasentinel-graphiti-mcp
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"   # HTTP MCP endpoint at /mcp/
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-malariasentinel_dev}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GRAPHITI_GROUP_ID: ${GRAPHITI_GROUP_ID:-malariasentinel}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      SEMAPHORE_LIMIT: ${SEMAPHORE_LIMIT:-10}
      GRAPHITI_TELEMETRY_ENABLED: "false"
      CONFIG_PATH: /app/mcp/config/config.yaml
    volumes:
      - ./config/config.yaml:/app/mcp/config/config.yaml:ro

volumes:
  neo4j_data:
    name: memory_neo4j_data
    external: true
  neo4j_logs:
    name: memory_neo4j_logs
    external: true
